name: Deploy Lambda

on:
  workflow_dispatch:

env:
  AWS_REGION: ${{ secrets.AWS_REGION }}
  AUTH_FUNCTION_NAME: ${{ vars.AUTH_FUNCTION_NAME || 'oficina-auth-cpf' }}
  AUTHORIZER_FUNCTION_NAME: ${{ vars.AUTHORIZER_FUNCTION_NAME || 'oficina-jwt-authorizer' }}
  RUNTIME: dotnet10
  PUBLISH_DIR: ${{ runner.temp }}/oficina-auth-lambda/publish
  ZIP_FILE: ${{ runner.temp }}/oficina-auth-lambda/oficina-auth-lambda.zip
  AUTH_HANDLER: Oficina.AuthLambda::Oficina.AuthLambda.Functions.AuthCpfFunction::HandleAsync
  AUTHORIZER_HANDLER: Oficina.AuthLambda::Oficina.AuthLambda.Functions.JwtAuthorizerFunction::HandleAsync

jobs:
  deploy:
    name: Deploy
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Validate required secrets
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_SESSION_TOKEN: ${{ secrets.AWS_SESSION_TOKEN }}
          AWS_REGION_SECRET: ${{ secrets.AWS_REGION }}
          AWS_LAMBDA_ROLE_ARN: ${{ secrets.AWS_LAMBDA_ROLE_ARN }}
          DB_CONNECTION_STRING: ${{ secrets.DB_CONNECTION_STRING }}
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          JWT_ISSUER: ${{ secrets.JWT_ISSUER }}
          JWT_AUDIENCE: ${{ secrets.JWT_AUDIENCE }}
          JWT_EXPIRATION_MINUTES: ${{ secrets.JWT_EXPIRATION_MINUTES }}
          LAMBDA_SUBNET_IDS: ${{ secrets.LAMBDA_SUBNET_IDS }}
          LAMBDA_SECURITY_GROUP_IDS: ${{ secrets.LAMBDA_SECURITY_GROUP_IDS }}
        run: |
          set -euo pipefail

          required=(
            AWS_ACCESS_KEY_ID
            AWS_SECRET_ACCESS_KEY
            AWS_REGION_SECRET
            AWS_LAMBDA_ROLE_ARN
            DB_CONNECTION_STRING
            JWT_SECRET
            JWT_ISSUER
            JWT_AUDIENCE
            JWT_EXPIRATION_MINUTES
            LAMBDA_SUBNET_IDS
            LAMBDA_SECURITY_GROUP_IDS
          )

          for name in "${required[@]}"; do
            if [ -z "${!name}" ]; then
              echo "::error::Required secret ${name} is not configured."
              exit 1
            fi
          done

          if [ -z "${DB_CONNECTION_STRING}" ]; then
            echo "::error::DB_CONNECTION_STRING is required."
            exit 1
          fi

          if [ "${DB_CONNECTION_STRING}" = "Server=" ]; then
            echo "::error::DB_CONNECTION_STRING is incomplete."
            exit 1
          fi

          if [[ ! "${AUTH_FUNCTION_NAME}" =~ ^[A-Za-z0-9_-]{1,64}$ ]]; then
            echo "::error::AUTH_FUNCTION_NAME variable must be a valid Lambda function name."
            exit 1
          fi

          if [[ ! "${AUTHORIZER_FUNCTION_NAME}" =~ ^[A-Za-z0-9_-]{1,64}$ ]]; then
            echo "::error::AUTHORIZER_FUNCTION_NAME variable must be a valid Lambda function name."
            exit 1
          fi

          if [[ ! "${AWS_LAMBDA_ROLE_ARN}" =~ ^arn:aws[a-zA-Z-]*:iam::[0-9]{12}:role/.+$ ]]; then
            echo "::error::AWS_LAMBDA_ROLE_ARN must be a valid IAM Role ARN."
            exit 1
          fi

          for token in "Server=" "Database=" "User Id=" "Password="; do
            if [[ "${DB_CONNECTION_STRING}" != *"${token}"* ]]; then
              echo "::error::DB_CONNECTION_STRING is missing a required segment."
              exit 1
            fi
          done

          IFS=',' read -ra subnets <<< "${LAMBDA_SUBNET_IDS}"
          if [ "${#subnets[@]}" -eq 0 ]; then
            echo "::error::LAMBDA_SUBNET_IDS must contain at least one subnet."
            exit 1
          fi

          for subnet in "${subnets[@]}"; do
            subnet="$(echo "${subnet}" | xargs)"
            if [[ "${subnet}" != subnet-* ]]; then
              echo "::error::LAMBDA_SUBNET_IDS must contain only subnet ids."
              exit 1
            fi
          done

          IFS=',' read -ra security_groups <<< "${LAMBDA_SECURITY_GROUP_IDS}"
          if [ "${#security_groups[@]}" -eq 0 ]; then
            echo "::error::LAMBDA_SECURITY_GROUP_IDS must contain at least one security group."
            exit 1
          fi

          for security_group in "${security_groups[@]}"; do
            security_group="$(echo "${security_group}" | xargs)"
            if [[ "${security_group}" != sg-* ]]; then
              echo "::error::LAMBDA_SECURITY_GROUP_IDS must contain only security group ids."
              exit 1
            fi
          done

          echo "AWS credentials configured: yes"
          echo "AWS region configured: yes"
          echo "DB connection string configured: yes"
          echo "JWT configuration configured: yes"
          echo "Lambda subnet ids configured: yes"
          echo "Lambda security group ids configured: yes"

      - name: Validate Lambda handlers
        run: |
          set -euo pipefail

          expected_auth_handler="Oficina.AuthLambda::Oficina.AuthLambda.Functions.AuthCpfFunction::HandleAsync"
          expected_authorizer_handler="Oficina.AuthLambda::Oficina.AuthLambda.Functions.JwtAuthorizerFunction::HandleAsync"

          if [ "${AUTH_HANDLER}" != "${expected_auth_handler}" ]; then
            echo "::error::AUTH_HANDLER does not match the project handler."
            exit 1
          fi

          if [ "${AUTHORIZER_HANDLER}" != "${expected_authorizer_handler}" ]; then
            echo "::error::AUTHORIZER_HANDLER does not match the project handler."
            exit 1
          fi

          echo "Lambda handlers validated."

      - name: Restore dependencies
        run: dotnet restore Oficina.AuthLambda.sln

      - name: Build solution
        run: dotnet build Oficina.AuthLambda.sln --configuration Release --no-restore

      - name: Run tests
        run: dotnet test Oficina.AuthLambda.sln --configuration Release --no-build

      - name: Publish Lambda project
        run: |
          mkdir -p "${PUBLISH_DIR}"
          dotnet publish src/Oficina.AuthLambda/Oficina.AuthLambda.csproj --configuration Release --output "${PUBLISH_DIR}"
          cd "${PUBLISH_DIR}"
          zip -r "${ZIP_FILE}" .

      - name: Prepare Lambda configuration files
        env:
          DB_CONNECTION_STRING: ${{ secrets.DB_CONNECTION_STRING }}
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          JWT_ISSUER: ${{ secrets.JWT_ISSUER }}
          JWT_AUDIENCE: ${{ secrets.JWT_AUDIENCE }}
          JWT_EXPIRATION_MINUTES: ${{ secrets.JWT_EXPIRATION_MINUTES }}
          LAMBDA_SUBNET_IDS: ${{ secrets.LAMBDA_SUBNET_IDS }}
          LAMBDA_SECURITY_GROUP_IDS: ${{ secrets.LAMBDA_SECURITY_GROUP_IDS }}
        run: |
          python - <<'PY'
          import json
          import os

          def split_csv(name):
              return [value.strip() for value in os.environ[name].split(",") if value.strip()]

          auth_env = {
              "Variables": {
                  "ConnectionStrings__SqlServer": os.environ["DB_CONNECTION_STRING"],
                  "Jwt__Secret": os.environ["JWT_SECRET"],
                  "Jwt__Issuer": os.environ["JWT_ISSUER"],
                  "Jwt__Audience": os.environ["JWT_AUDIENCE"],
                  "Jwt__ExpirationMinutes": os.environ["JWT_EXPIRATION_MINUTES"],
              }
          }

          authorizer_env = {
              "Variables": {
                  "Jwt__Secret": os.environ["JWT_SECRET"],
                  "Jwt__Issuer": os.environ["JWT_ISSUER"],
                  "Jwt__Audience": os.environ["JWT_AUDIENCE"],
                  "Jwt__ExpirationMinutes": os.environ["JWT_EXPIRATION_MINUTES"],
              }
          }

          auth_vpc = {
              "SubnetIds": split_csv("LAMBDA_SUBNET_IDS"),
              "SecurityGroupIds": split_csv("LAMBDA_SECURITY_GROUP_IDS"),
          }

          with open("/tmp/auth-env.json", "w", encoding="utf-8") as f:
              json.dump(auth_env, f)
          with open("/tmp/authorizer-env.json", "w", encoding="utf-8") as f:
              json.dump(authorizer_env, f)
          with open("/tmp/auth-vpc.json", "w", encoding="utf-8") as f:
              json.dump(auth_vpc, f)
          PY

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Resolve AWS Lambda role
        id: role
        env:
          AWS_LAMBDA_ROLE_ARN: ${{ secrets.AWS_LAMBDA_ROLE_ARN }}
        run: |
          account_id="$(aws sts get-caller-identity --query Account --output text)"
          role_arn="${AWS_LAMBDA_ROLE_ARN}"

          if [[ ! "${role_arn}" =~ ^arn:aws[a-zA-Z-]*:iam::${account_id}:role/.+$ ]]; then
            echo "::error::AWS_LAMBDA_ROLE_ARN must belong to the authenticated AWS account."
            exit 1
          fi

          echo "role_arn=${role_arn}" >> "$GITHUB_OUTPUT"

      - name: Deploy Auth Lambda
        run: |
          if aws lambda get-function --function-name "${AUTH_FUNCTION_NAME}" >/dev/null 2>&1; then
            aws lambda update-function-code \
              --function-name "${AUTH_FUNCTION_NAME}" \
              --zip-file "fileb://${ZIP_FILE}"
            aws lambda wait function-updated --function-name "${AUTH_FUNCTION_NAME}"

            aws lambda update-function-configuration \
              --function-name "${AUTH_FUNCTION_NAME}" \
              --runtime "${RUNTIME}" \
              --role "${{ steps.role.outputs.role_arn }}" \
              --handler "${AUTH_HANDLER}" \
              --memory-size 256 \
              --timeout 15 \
              --environment "file:///tmp/auth-env.json" \
              --vpc-config "file:///tmp/auth-vpc.json"
            aws lambda wait function-updated --function-name "${AUTH_FUNCTION_NAME}"
          else
            aws lambda create-function \
              --function-name "${AUTH_FUNCTION_NAME}" \
              --runtime "${RUNTIME}" \
              --role "${{ steps.role.outputs.role_arn }}" \
              --handler "${AUTH_HANDLER}" \
              --memory-size 256 \
              --timeout 15 \
              --zip-file "fileb://${ZIP_FILE}" \
              --environment "file:///tmp/auth-env.json" \
              --vpc-config "file:///tmp/auth-vpc.json"
            aws lambda wait function-active --function-name "${AUTH_FUNCTION_NAME}"
          fi

      - name: Deploy JWT Authorizer Lambda
        run: |
          if aws lambda get-function --function-name "${AUTHORIZER_FUNCTION_NAME}" >/dev/null 2>&1; then
            aws lambda update-function-code \
              --function-name "${AUTHORIZER_FUNCTION_NAME}" \
              --zip-file "fileb://${ZIP_FILE}"
            aws lambda wait function-updated --function-name "${AUTHORIZER_FUNCTION_NAME}"

            aws lambda update-function-configuration \
              --function-name "${AUTHORIZER_FUNCTION_NAME}" \
              --runtime "${RUNTIME}" \
              --role "${{ steps.role.outputs.role_arn }}" \
              --handler "${AUTHORIZER_HANDLER}" \
              --memory-size 256 \
              --timeout 5 \
              --environment "file:///tmp/authorizer-env.json" \
              --vpc-config "SubnetIds=[],SecurityGroupIds=[]"
            aws lambda wait function-updated --function-name "${AUTHORIZER_FUNCTION_NAME}"
          else
            aws lambda create-function \
              --function-name "${AUTHORIZER_FUNCTION_NAME}" \
              --runtime "${RUNTIME}" \
              --role "${{ steps.role.outputs.role_arn }}" \
              --handler "${AUTHORIZER_HANDLER}" \
              --memory-size 256 \
              --timeout 5 \
              --zip-file "fileb://${ZIP_FILE}" \
              --environment "file:///tmp/authorizer-env.json"
            aws lambda wait function-active --function-name "${AUTHORIZER_FUNCTION_NAME}"
          fi

      - name: Validate deployed Lambdas
        run: |
          set -euo pipefail

          read -r auth_state auth_update auth_runtime auth_handler auth_timeout auth_memory auth_subnets auth_security_groups < <(
            aws lambda get-function-configuration \
              --function-name "${AUTH_FUNCTION_NAME}" \
              --query '[State,LastUpdateStatus,Runtime,Handler,Timeout,MemorySize,length(VpcConfig.SubnetIds || `[]`),length(VpcConfig.SecurityGroupIds || `[]`)]' \
              --output text
          )

          echo "${AUTH_FUNCTION_NAME}: state=${auth_state}, lastUpdate=${auth_update}, runtime=${auth_runtime}, handler=${auth_handler}, timeout=${auth_timeout}, memory=${auth_memory}, subnetCount=${auth_subnets}, securityGroupCount=${auth_security_groups}"

          if [ "${auth_state}" != "Active" ] || [ "${auth_update}" != "Successful" ]; then
            echo "::error::${AUTH_FUNCTION_NAME} is not Active/Successful."
            exit 1
          fi

          if [ "${auth_runtime}" != "${RUNTIME}" ]; then
            echo "::error::${AUTH_FUNCTION_NAME} runtime does not match ${RUNTIME}."
            exit 1
          fi

          if [ "${auth_handler}" != "${AUTH_HANDLER}" ]; then
            echo "::error::${AUTH_FUNCTION_NAME} handler does not match ${AUTH_HANDLER}."
            exit 1
          fi

          if [ "${auth_timeout}" -ne 15 ]; then
            echo "::error::${AUTH_FUNCTION_NAME} timeout must be 15 seconds."
            exit 1
          fi

          if [ "${auth_memory}" -ne 256 ]; then
            echo "::error::${AUTH_FUNCTION_NAME} memory must be 256 MB."
            exit 1
          fi

          if [ "${auth_subnets}" -eq 0 ] || [ "${auth_security_groups}" -eq 0 ]; then
            echo "::error::${AUTH_FUNCTION_NAME} must have VpcConfig with subnets and security groups."
            exit 1
          fi

          read -r authorizer_state authorizer_update authorizer_runtime authorizer_handler authorizer_timeout authorizer_memory authorizer_subnets authorizer_security_groups < <(
            aws lambda get-function-configuration \
              --function-name "${AUTHORIZER_FUNCTION_NAME}" \
              --query '[State,LastUpdateStatus,Runtime,Handler,Timeout,MemorySize,length(VpcConfig.SubnetIds || `[]`),length(VpcConfig.SecurityGroupIds || `[]`)]' \
              --output text
          )

          echo "${AUTHORIZER_FUNCTION_NAME}: state=${authorizer_state}, lastUpdate=${authorizer_update}, runtime=${authorizer_runtime}, handler=${authorizer_handler}, timeout=${authorizer_timeout}, memory=${authorizer_memory}, subnetCount=${authorizer_subnets}, securityGroupCount=${authorizer_security_groups}"

          if [ "${authorizer_state}" != "Active" ] || [ "${authorizer_update}" != "Successful" ]; then
            echo "::error::${AUTHORIZER_FUNCTION_NAME} is not Active/Successful."
            exit 1
          fi

          if [ "${authorizer_runtime}" != "${RUNTIME}" ]; then
            echo "::error::${AUTHORIZER_FUNCTION_NAME} runtime does not match ${RUNTIME}."
            exit 1
          fi

          if [ "${authorizer_handler}" != "${AUTHORIZER_HANDLER}" ]; then
            echo "::error::${AUTHORIZER_FUNCTION_NAME} handler does not match ${AUTHORIZER_HANDLER}."
            exit 1
          fi

          if [ "${authorizer_timeout}" -ne 5 ]; then
            echo "::error::${AUTHORIZER_FUNCTION_NAME} timeout must be 5 seconds."
            exit 1
          fi

          if [ "${authorizer_memory}" -ne 256 ]; then
            echo "::error::${AUTHORIZER_FUNCTION_NAME} memory must be 256 MB."
            exit 1
          fi

          if [ "${authorizer_subnets}" -ne 0 ] || [ "${authorizer_security_groups}" -ne 0 ]; then
            echo "::error::${AUTHORIZER_FUNCTION_NAME} must not have VpcConfig."
            exit 1
          fi
