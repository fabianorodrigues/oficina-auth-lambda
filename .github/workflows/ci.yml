name: CI

on:
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-test:
    name: Build and Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Restore
        run: dotnet restore Oficina.AuthLambda.sln

      - name: Build
        run: dotnet build Oficina.AuthLambda.sln --configuration Release --no-restore

      - name: Test
        run: dotnet test Oficina.AuthLambda.sln --configuration Release --no-build
